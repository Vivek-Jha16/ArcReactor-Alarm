<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ARC REACTOR — STARK CLOCK</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<!-- ── Scan-line overlay ────────────────────── -->
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- ── HUD corner marks ─────────────────────── -->
<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>

<!-- ══════════════════════════════════════════
     MAIN LAYOUT
═══════════════════════════════════════════ -->
<div class="app-shell">

  <!-- ── TOP STATUS BAR ─────────────────────── -->
  <header class="status-bar">
    <div class="status-left">
      <span class="status-dot pulse"></span>
      <span class="mono">STARK INDUSTRIES — ARC CLOCK v3.7</span>
    </div>
    <div class="status-center">
      <span class="mono" id="utc-clock">UTC 00:00:00</span>
    </div>
    <div class="status-right">
      <span class="mono power-pct" id="power-pct">PWR <span>100%</span></span>
    </div>
  </header>

  <!-- ── THREE-COLUMN MAIN ──────────────────── -->
  <main class="main-grid">

    <!-- ── LEFT: World Clocks ─────────────────── -->
    <aside class="panel panel-left">
      <div class="panel-label">GLOBAL TIMEZONE ARRAY</div>

      <div class="tz-search-wrap">
        <input id="tz-search" class="tz-search" placeholder="Search city or timezone…" autocomplete="off"/>
        <span class="tz-search-icon">⌕</span>
      </div>

      <div class="tz-list" id="tz-list">
        <!-- injected by JS -->
      </div>
    </aside>

    <!-- ── CENTER: Arc Reactor Clock ────────── -->
    <section class="reactor-section">

      <!-- Arc Reactor SVG + canvas clock -->
      <div class="reactor-wrap" id="reactor-wrap">
        <canvas id="arc-canvas" width="480" height="480"></canvas>

        <!-- Digital time overlay -->
        <div class="reactor-time-overlay">
          <div class="main-time" id="main-time">00:00:00</div>
          <div class="main-date" id="main-date">—</div>
          <div class="main-tz"  id="main-tz">UTC</div>
        </div>

        <!-- Alarm ring indicator -->
        <div class="alarm-ring" id="alarm-ring"></div>
      </div>

      <!-- Reactor sub-info -->
      <div class="reactor-meta">
        <div class="meta-chip">
          <span class="meta-label">CORE TEMP</span>
          <span class="meta-val" id="core-temp">—</span>
        </div>
        <div class="meta-chip">
          <span class="meta-label">OUTPUT</span>
          <span class="meta-val">3.2 GJ/s</span>
        </div>
        <div class="meta-chip">
          <span class="meta-label">ALARMS</span>
          <span class="meta-val" id="alarm-count">0</span>
        </div>
      </div>

      <!-- TZ selector for main clock -->
      <div class="tz-selector-wrap">
        <label class="mono small-label">DISPLAY TIMEZONE</label>
        <select id="main-tz-select" class="tz-select">
          <!-- filled by JS -->
        </select>
      </div>

    </section>

    <!-- ── RIGHT: Alarm Panel ─────────────────── -->
    <aside class="panel panel-right">
      <div class="panel-label">ALARM PROTOCOLS</div>

      <!-- Add Alarm Form -->
      <div class="alarm-form" id="alarm-form">
        <div class="form-row">
          <label class="mono small-label">TIME</label>
          <input type="time" id="al-time" class="arc-input" value="07:00"/>
        </div>
        <div class="form-row">
          <label class="mono small-label">LABEL</label>
          <input type="text" id="al-label" class="arc-input" placeholder="MISSION BRIEFING" maxlength="24"/>
        </div>
        <div class="form-row">
          <label class="mono small-label">DAYS</label>
          <div class="day-picker" id="day-picker">
            <button class="day-btn" data-day="Sun">S</button>
            <button class="day-btn" data-day="Mon">M</button>
            <button class="day-btn" data-day="Tue">T</button>
            <button class="day-btn" data-day="Wed">W</button>
            <button class="day-btn" data-day="Thu">T</button>
            <button class="day-btn" data-day="Fri">F</button>
            <button class="day-btn" data-day="Sat">S</button>
          </div>
        </div>
        <div class="form-row">
          <label class="mono small-label">ALERT TONE</label>
          <div class="tone-picker" id="tone-picker">
            <button class="tone-btn active" data-tone="arc">⚡ ARC</button>
            <button class="tone-btn" data-tone="jarvis">🤖 JARVIS</button>
            <button class="tone-btn" data-tone="repulsor">🔵 REPULSOR</button>
          </div>
        </div>
        <button class="arm-btn" id="arm-btn" onclick="addAlarm()">
          <span class="arm-icon">⊕</span> ARM ALARM
        </button>
      </div>

      <!-- Alarm list -->
      <div class="alarm-list" id="alarm-list">
        <!-- injected by JS -->
      </div>

    </aside>
  </main>

  <!-- ── BOTTOM: Firing alarm overlay ──────── -->
  <div class="alarm-overlay" id="alarm-overlay">
    <div class="alarm-overlay-inner">
      <div class="alarm-pulse-ring"></div>
      <div class="alarm-pulse-ring delay1"></div>
      <div class="alarm-pulse-ring delay2"></div>
      <div class="alarm-fire-icon">⚡</div>
      <div class="alarm-fire-label" id="alarm-fire-label">STARK PROTOCOL</div>
      <div class="alarm-fire-time"  id="alarm-fire-time">07:00</div>
      <button class="dismiss-btn" onclick="dismissAlarm()">
        DISARM <span class="mono">[ PRESS TO DISMISS ]</span>
      </button>
    </div>
  </div>

</div><!-- /app-shell -->

<!-- ── Hidden audio contexts (generated via Web Audio) ──── -->
<script src="/static/js/script.js"></script>
</body>
</html>
